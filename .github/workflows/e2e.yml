name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which suite to run"
        type: choice
        options:
          - agent
          - orchestration
          - capacity
          - all
        default: all

jobs:
  e2e-agent:
    if: inputs.tier == 'agent' || inputs.tier == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: e2e
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_WEBHOOK_SECRET: ${{ secrets.JIRA_WEBHOOK_SECRET }}
      COLUMN_AI: ${{ secrets.COLUMN_AI }}
      COLUMN_AI_REVIEW: ${{ secrets.COLUMN_AI_REVIEW }}
      COLUMN_BACKLOG: ${{ secrets.COLUMN_BACKLOG }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      E2E_GITHUB_OWNER: ${{ secrets.E2E_GITHUB_OWNER }}
      E2E_GITHUB_REPO: ${{ secrets.E2E_GITHUB_REPO }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      AI_WORKFLOW_KV_REST_API_URL: ${{ secrets.AI_WORKFLOW_KV_REST_API_URL }}
      AI_WORKFLOW_KV_REST_API_TOKEN: ${{ secrets.AI_WORKFLOW_KV_REST_API_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
      MAX_CONCURRENT_AGENTS: ${{ secrets.MAX_CONCURRENT_AGENTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20.12"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:e2e:agent
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-agent-results
          path: |
            e2e/**/*.log
          retention-days: 7

  e2e-orchestration:
    needs: [e2e-agent]
    if: |
      always() &&
      (needs.e2e-agent.result == 'success' || needs.e2e-agent.result == 'skipped') &&
      (inputs.tier == 'orchestration' || inputs.tier == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: e2e
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_WEBHOOK_SECRET: ${{ secrets.JIRA_WEBHOOK_SECRET }}
      COLUMN_AI: ${{ secrets.COLUMN_AI }}
      COLUMN_AI_REVIEW: ${{ secrets.COLUMN_AI_REVIEW }}
      COLUMN_BACKLOG: ${{ secrets.COLUMN_BACKLOG }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      E2E_GITHUB_OWNER: ${{ secrets.E2E_GITHUB_OWNER }}
      E2E_GITHUB_REPO: ${{ secrets.E2E_GITHUB_REPO }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      AI_WORKFLOW_KV_REST_API_URL: ${{ secrets.AI_WORKFLOW_KV_REST_API_URL }}
      AI_WORKFLOW_KV_REST_API_TOKEN: ${{ secrets.AI_WORKFLOW_KV_REST_API_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
      MAX_CONCURRENT_AGENTS: ${{ secrets.MAX_CONCURRENT_AGENTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20.12"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:e2e:orchestration
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-orchestration-results
          path: |
            e2e/**/*.log
          retention-days: 7

  e2e-capacity:
    needs: [e2e-orchestration]
    if: |
      always() &&
      (needs.e2e-orchestration.result == 'success' || needs.e2e-orchestration.result == 'skipped') &&
      (inputs.tier == 'capacity' || inputs.tier == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: e2e
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_WEBHOOK_SECRET: ${{ secrets.JIRA_WEBHOOK_SECRET }}
      COLUMN_AI: ${{ secrets.COLUMN_AI }}
      COLUMN_AI_REVIEW: ${{ secrets.COLUMN_AI_REVIEW }}
      COLUMN_BACKLOG: ${{ secrets.COLUMN_BACKLOG }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      E2E_GITHUB_OWNER: ${{ secrets.E2E_GITHUB_OWNER }}
      E2E_GITHUB_REPO: ${{ secrets.E2E_GITHUB_REPO }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      AI_WORKFLOW_KV_REST_API_URL: ${{ secrets.AI_WORKFLOW_KV_REST_API_URL }}
      AI_WORKFLOW_KV_REST_API_TOKEN: ${{ secrets.AI_WORKFLOW_KV_REST_API_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
      MAX_CONCURRENT_AGENTS: ${{ secrets.MAX_CONCURRENT_AGENTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20.12"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:e2e:capacity
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-capacity-results
          path: |
            e2e/**/*.log
          retention-days: 7
