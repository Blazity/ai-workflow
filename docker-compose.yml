services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blazebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blazebot}
      POSTGRES_DB: ${POSTGRES_DB:-blazebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blazebot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }

  sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
    image: blazebot-sandbox:latest
    profiles:
      - build-only

volumes:
  postgres_data:
